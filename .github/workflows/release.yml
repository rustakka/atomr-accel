name: Release

# Releases are tagged from `main`. Push a tag matching `v*` (e.g.
# `v0.1.0`, `v1.0.0-rc.1`) to fire this pipeline. The bump-and-tag
# step is automated by `.github/workflows/version-bump.yml` (see the
# `.claude/skills/version-bump/SKILL.md` skill).
#
# This workflow:
#   1. Runs the local release-pipeline gate (`cargo xtask verify`).
#   2. Builds Python wheels (manylinux x86_64 + aarch64, musllinux
#      x86_64 + aarch64, macOS universal2, Windows x86_64) and an
#      sdist. aarch64 Linux wheels are built natively on
#      `ubuntu-22.04-arm` runners.
#   3. Creates the GitHub Release with the artifacts attached.
#   4. Publishes every publishable Rust crate to crates.io in
#      dependency order (with rate-limit retry).
#   5. Publishes wheels + sdist to PyPI (trusted publishing).
#
# Honors `--dry-run` for `workflow_dispatch`.
#
# Mirrors the atomr workspace's release.yml — same job graph, same
# dry-run semantics, same trusted-publishing setup.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish + maturin upload with --dry-run; skip GitHub Release upload"
        required: false
        default: "true"
      skip_python:
        description: "Skip the Python wheel build/publish jobs"
        required: false
        default: "false"
      skip_crates:
        description: "Skip the crates.io publish job"
        required: false
        default: "false"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Gate ─────────────────────────────────────────────────────────────
  verify:
    name: Verify (release-pipeline gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with:
          repository: rustakka/atomr
          path: atomr
      - name: Checkout atomr-accel
        uses: actions/checkout@v4
        with:
          path: atomr-accel
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy, rustfmt }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: atomr-accel }
      - name: cargo xtask verify
        run: cargo xtask verify
        working-directory: atomr-accel

  # ─── Python wheels ───────────────────────────────────────────────────
  build-wheels:
    name: Build wheels (${{ matrix.target }} / ${{ matrix.os }})
    needs: verify
    if: github.event_name == 'push' || github.event.inputs.skip_python != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux glibc + musl, x86_64 + aarch64. maturin uses
          # manylinux/musllinux containers under the hood; the
          # `manylinux: auto` flag picks the right base image.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python-target: x86_64
            manylinux: auto
          # aarch64 Linux glibc — built natively on a GitHub-hosted
          # ARM runner so we don't have to cross-compile inside the
          # x86_64 manylinux container. Mirrors the atomr workspace.
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            python-target: aarch64
            manylinux: auto
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            python-target: x86_64
            manylinux: musllinux_1_2
          # aarch64 Linux musl — also built natively on the ARM
          # runner, mirroring the glibc coverage.
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-musl
            python-target: aarch64
            manylinux: musllinux_1_2
          # macOS — universal2 yields a single fat wheel covering
          # both x86_64 and arm64.
          - os: macos-latest
            target: universal2-apple-darwin
            python-target: universal2
            manylinux: "off"
          # Windows.
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python-target: x64
            manylinux: "off"
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with:
          repository: rustakka/atomr
          path: atomr
      - name: Checkout atomr-accel
        uses: actions/checkout@v4
        with:
          path: atomr-accel
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.python-target }}
          # abi3-py310 wheel: one binary per (os, arch) covers Python 3.10+.
          # We still pass interpreter hints so manylinux containers grab
          # the right CPython headers.
          args: --release --strip --out dist --no-default-features --features extension-module
          manylinux: ${{ matrix.manylinux }}
          working-directory: atomr-accel/crates/atomr-accel-py
      - uses: actions/upload-artifact@v4
        with:
          name: atomr-accel-wheels-${{ matrix.target }}
          path: atomr-accel/crates/atomr-accel-py/dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build sdist (Python)
    needs: verify
    if: github.event_name == 'push' || github.event.inputs.skip_python != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with:
          repository: rustakka/atomr
          path: atomr
      - name: Checkout atomr-accel
        uses: actions/checkout@v4
        with:
          path: atomr-accel
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: atomr-accel/crates/atomr-accel-py
      - uses: actions/upload-artifact@v4
        with:
          name: atomr-accel-sdist
          path: atomr-accel/crates/atomr-accel-py/dist/*.tar.gz
          if-no-files-found: error

  # ─── GitHub Release ──────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [verify, build-wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate release notes
        id: notes
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          prev=$(git tag --sort=-creatordate | grep -v "^${tag}$" | head -n1 || true)
          range="${prev:+$prev..}HEAD"
          {
            echo "## atomr-accel ${tag}"
            echo
            echo "### Changes"
            git log --no-merges --pretty=format:'- %s (%h)' "${range}"
            echo
            echo
            echo "### Crates published"
            echo "- atomr-accel"
            echo "- atomr-accel-telemetry"
            echo "- atomr-accel-flashattn"
            echo "- atomr-accel-tensorrt"
            echo "- atomr-accel-cutlass"
            echo "- atomr-accel-cuda"
            echo "- atomr-accel-patterns"
            echo "- atomr-accel-agents"
            echo "- atomr-accel-cuda-realtime"
            echo "- atomr-accel-train"
            echo
            echo "### Python wheels"
            ls artifacts | grep "atomr-accel-wheels-" | sed 's/^/- /' || true
          } > RELEASE_NOTES.md
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: atomr-accel ${{ steps.notes.outputs.tag }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ contains(steps.notes.outputs.tag, '-') }}
          files: |
            artifacts/**/*.whl
            artifacts/**/*.tar.gz

  # ─── crates.io ───────────────────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    needs: [verify, github-release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.event.inputs.skip_crates != 'true'
    environment: crates-io
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with:
          repository: rustakka/atomr
          path: atomr
      - name: Checkout atomr-accel
        uses: actions/checkout@v4
        with:
          path: atomr-accel
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: atomr-accel }
      - name: Publish all crates in dep order
        working-directory: atomr-accel
        run: |
          set -euo pipefail
          # crates.io applies a "new crates per period" rate limit. Pace
          # successful publishes with a sleep, retry transient 429s
          # after a longer backoff. `already uploaded` is treated as
          # success so a partially-completed run can be safely retried
          # by re-tagging.
          publish_one() {
            local crate=$1
            local attempt=1
            while true; do
              echo "==> publishing $crate (attempt $attempt)"
              local out
              if out=$(cargo publish -p "$crate" 2>&1); then
                printf '%s\n' "$out"
                sleep 30
                return 0
              fi
              printf '%s\n' "$out"
              if printf '%s' "$out" | grep -qE "already (uploaded|exists)"; then
                echo "    (already on crates.io — continuing)"
                return 0
              fi
              if printf '%s' "$out" | grep -qE "(429|Too Many Requests|rate.*limit)" && [ $attempt -lt 6 ]; then
                local delay=$((90 * attempt))
                echo "    (rate-limited — sleeping ${delay}s before retry)"
                sleep "$delay"
                attempt=$((attempt + 1))
                continue
              fi
              return 1
            done
          }
          # Strict dep-order:
          #   1. atomr-accel       — umbrella core (no internal deps)
          #   2. layer-0 leaves    — telemetry / flashattn / tensorrt / cutlass
          #                          (atomr-accel-cuda has version-pinned
          #                          optional deps on these; they must be on
          #                          crates.io before cuda can publish)
          #   3. atomr-accel-cuda  — depends on atomr-accel + the layer-0 leaves
          #   4. blueprints        — patterns / agents / cuda-realtime
          #                          (each depends only on atomr-accel-cuda)
          #   5. atomr-accel-train — depends on atomr-accel-patterns
          for crate in \
            atomr-accel \
            atomr-accel-telemetry \
            atomr-accel-flashattn \
            atomr-accel-tensorrt \
            atomr-accel-cutlass \
            atomr-accel-cuda \
            atomr-accel-patterns \
            atomr-accel-agents \
            atomr-accel-cuda-realtime \
            atomr-accel-train; do
            publish_one "$crate"
          done

  publish-crates-dry-run:
    name: Publish to crates.io (dry run)
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' && github.event.inputs.skip_crates != 'true'
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with:
          repository: rustakka/atomr
          path: atomr
      - name: Checkout atomr-accel
        uses: actions/checkout@v4
        with:
          path: atomr-accel
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: atomr-accel }
      - name: Dry-run publish
        working-directory: atomr-accel
        run: |
          for c in atomr-accel atomr-accel-telemetry atomr-accel-flashattn atomr-accel-tensorrt atomr-accel-cutlass atomr-accel-cuda atomr-accel-patterns atomr-accel-agents atomr-accel-cuda-realtime atomr-accel-train; do
            echo "==> $c"
            cargo publish -p "$c" --dry-run --allow-dirty || true
          done

  # ─── PyPI ────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish wheels + sdist to PyPI
    needs: [verify, build-wheels, build-sdist, github-release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.event.inputs.skip_python != 'true'
    # Trusted publishing — configure on PyPI: pypi.org → manage project →
    # publishing → add GitHub publisher (owner / repo / workflow / env).
    environment:
      name: pypi
      url: https://pypi.org/p/atomr-accel
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "atomr-accel-{wheels-*,sdist}"
      - name: Flatten wheel + sdist artifacts
        run: |
          mkdir -p upload
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} upload/ \;
          ls -la upload/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: upload
          # Idempotent: skip files PyPI already has so a partial-fail
          # release (e.g. crates.io step failed) can be re-tagged and
          # the wheel/sdist publish step is a no-op the second time.
          skip-existing: true
          # If trusted publishing is not yet configured, set
          # `password: ${{ secrets.PYPI_API_TOKEN }}` instead.
          skip-existing: true

  publish-pypi-dry-run:
    name: PyPI dry-run (TestPyPI)
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' && github.event.inputs.skip_python != 'true'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/atomr-accel
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "atomr-accel-{wheels-*,sdist}"
      - name: Flatten wheel + sdist artifacts
        run: |
          mkdir -p upload
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} upload/ \;
          ls -la upload/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: upload
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
